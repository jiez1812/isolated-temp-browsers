name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm (standalone .exe)
        shell: pwsh
        run: |
          $version = '10.28.2'
          $dest = "$env:USERPROFILE\pnpm-bin"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri "https://github.com/pnpm/pnpm/releases/download/v$version/pnpm-win-x64.exe" -OutFile "$dest\pnpm.exe"
          Add-Content -Path $env:GITHUB_PATH -Value $dest
          & "$dest\pnpm.exe" --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package
        run: pnpm dist:win

      - name: Zip installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist -Filter '*Setup*.exe' | Select-Object -First 1
          Compress-Archive -Path $installer.FullName -DestinationPath "dist\$($installer.BaseName).zip"

      - name: Upload installer (zip)
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist\*Setup*.zip
          if-no-files-found: error

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: portable
          path: dist\*portable*.exe
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist\*Setup*.zip
            dist\*portable*.exe
          generate_release_notes: true
