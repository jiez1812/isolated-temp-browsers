appId: com.isolatedtempbrowsers.app
productName: Isolated Temp Browsers

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: images/
    to: images/

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

portable:
  artifactName: "${productName}-${version}-portable.exe"
